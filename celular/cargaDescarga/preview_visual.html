<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepX PRO - Portfólio Slider</title>
    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* iPhone Frame */
        .iphone-frame {
            width: 300px;
            height: 620px;
            background: #000;
            border-radius: 50px;
            border: 4px solid #222;
            padding: 12px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .screen-content {
            background: #000;
            height: 100%;
            width: 100%;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
        }

        /* Slider Logic */
        .slider-track {
            display: flex;
            height: 100%;
            width: 400%; /* 4 slides */
            animation: slideAnimation 12s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .slide {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0A0A0A;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideAnimation {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        /* Dots Container */
        .dots-container {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 20;
        }

        .dot-bg {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        /* The Moving Red Ping */
        .active-ping {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FF0000;
            border-radius: 50%;
            left: 15px;
            box-shadow: 0 0 15px #FF0000, 0 0 5px #FF0000;
            animation: movePing 12s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes movePing {
            0%, 20% { left: 15px; }
            25%, 45% { left: 38px; } /* 15 + 8 + 15 gap roughly */
            50%, 70% { left: 61px; }
            75%, 95% { left: 84px; }
            100% { left: 15px; }
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="screen-content">
            <div class="slider-track">
                <div class="slide">
                    <img src="./photos/print_CD1.jpeg" alt="Tela 1">
                </div>
                <div class="slide">
                    <img src="./photos/print_CD2.jpeg" alt="Tela 2">
                </div>
                <div class="slide">
                    <img src="./photos/print_CD3.jpeg" alt="Tela 3">
                </div>
                <div class="slide">
                    <img src="./photos/print_CD4.jpeg" alt="Tela 4">
                </div>
            </div>

            <div class="dots-container">
                <div class="dot-bg"></div>
                <div class="dot-bg"></div>
                <div class="dot-bg"></div>
                <div class="dot-bg"></div>
                <!-- O ping vermelho que viaja -->
                <div class="active-ping"></div>
            </div>
        </div>
    </div>

</body>
</html>
